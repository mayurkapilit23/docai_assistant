name: docai_assistant
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  dio: ^5.9.1
  dotted_border: ^3.1.0
  equatable: ^2.0.8
  file_picker: ^10.3.10
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  http: ^1.6.0
  hugeicons: ^1.1.5
  intl: ^0.20.2
  shared_preferences: ^2.5.4
  uuid: ^4.5.3


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.5
  flutter_lints: ^6.0.0


flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/images/doc.png"
  min_sdk_android: 21 # android min sdk min:16, default 21

flutter_native_splash:
  image: assets/images/doc.png
  color: "#E40505"
  fullscreen: true

flutter:

  uses-material-design: true

  assets:
    - assets/images/

